<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 64" fill="none">
  <!-- NEXORA Horizontal Logo -->
  <defs>
    <linearGradient id="bgGradientH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="textGradientH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="glowH" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.4" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
  </defs>

  <!-- Logo mark (square) -->
  <rect x="0" y="4" width="56" height="56" rx="12" fill="url(#bgGradientH)" filter="url(#glowH)"/>
  
  <!-- Geometric "N" in logo mark -->
  <g fill="url(#textGradientH)" transform="translate(14 14)">
    <path d="M 6 24 L 6 6 L 10 6 L 10 24 Z" />
    <path d="M 10 24 L 10 19 L 34 7 L 34 13 L 14 24 Z" />
    <path d="M 34 13 L 34 24 L 38 24 L 38 13 Z" />
  </g>

  <!-- Sparkle accent -->
  <g fill="#ffffff" opacity="0.9" transform="translate(44 8)">
    <path d="M 6 2 L 7 5 L 10 5 L 7 7 L 8 10 L 7 7 L 5 10 L 6 7 L 3 5 L 7 5 Z" transform="rotate(-10 6 6)"/>
  </g>

  <!-- Wordmark "NEXORA" -->
  <text x="72" y="40" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="url(#textGradientH)" letter-spacing="-0.5px">NEXORA</text>
  
  <!-- Tagline -->
  <text x="72" y="54" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" letter-spacing="1.5px" text-transform="uppercase">AI BRAND ARCHITECT</text>
</svg>