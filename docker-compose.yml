version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexora-postgres
    environment:
      POSTGRES_DB: nexora
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexora-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: nexora-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://nexora:nexora_dev@postgres:5432/nexora
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-nexora-dev-secret-key}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_uploads:/app/apps/server/uploads

volumes:
  postgres_data:
  redis_data:
  api_uploads:
